<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Manager</title>
    <style>
        body{
            font-family: Arial;
            margin:40px;
            background:#f5f5f5;
        }

        nav{
            margin-bottom:20px;
        }

        a{
            text-decoration:none;
            margin-right:10px;
            color:#007bff;
        }

        .container{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        button{
            padding:6px 10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'create_event' %}">Create Event</a>
</nav>

<div class="container">
    {% block content %}

    {% endblock %}
</div>

</body>
</html>
