{% extends 'base/base.html' %}

{% block content %}

<h2>Update Event</h2>

<form method="POST">
    {% csrf_token %}

    <label>Name</label><br>
    <input type="text" name="name" value="{{ event.name }}"><br><br>

    <label>Description</label><br>
    <textarea name="description">{{ event.description }}</textarea><br><br>

    <label>Location</label><br>
    <input type="text" name="location" value="{{ event.location }}"><br><br>

    <label>Start Date</label><br>
    <input type="date" name="start_date" value="{{ event.start_date|date:'Y-m-d' }}"><br><br>

    <label>End Date</label><br>
    <input type="date" name="end_date" value="{{ event.end_date|date:'Y-m-d' }}"><br><br>

    <button type="submit">Update Event</button>

</form>

{% endblock %}
