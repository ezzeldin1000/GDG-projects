{% extends 'base/base.html' %}

{% block content %}

<h2>All Events</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Location</th>
        <th>Start</th>
        <th>End</th>
        <th>Actions</th>
    </tr>

    {% for event in events %}
    <tr>
        <td>{{ event.name }}</td>
        <td>{{ event.location }}</td>
        <td>{{ event.start_date }}</td>
        <td>{{ event.end_date }}</td>

        <td>
            <a href="{% url 'update_event' event.id %}">Edit</a>
            <a href="{% url 'delete_event' event.id %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No events available</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
